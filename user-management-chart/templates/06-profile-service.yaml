apiVersion: v1
kind: Service
metadata:
  name: profile-service
spec:
  type: ClusterIP
  selector:
    app: profile-service
  ports:
  - port: {{ .Values.service.profile.port }}
    targetPort: {{ .Values.service.profile.targetPort }}
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
      - name: profile-app
        image: profile-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.service.profile.targetPort }}
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: DB_HOST
          value: "postgres-db"
        - name: DB_NAME
          value: "userdb"
        - name: DB_USER
          value: "admin"
        - name: PROFILE_TITLE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PROFILE_TITLE
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.profile.targetPort }}
          initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.periodSeconds }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.service.profile.targetPort }}
          initialDelaySeconds: {{ .Values.probes.readinessInitialDelaySeconds }}
          periodSeconds: {{ .Values.probes.periodSeconds }}
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
